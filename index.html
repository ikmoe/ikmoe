<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Vesa" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Vesa" />

  <script>
    // 获取当前访问的域名（不带端口）
    const domain = window.location.hostname;

    // 配置不同域名对应的标题、描述、推特标题
    const domainConfig = {
      // 你可以无限添加域名
      "*.hk.sb": {
        title: "长空通信 - 官方网站",
        desc: "更多套餐请看10010.co",
        ogTitle: "长空通信 - 官方网站"
      },
      "hk.sb": {
        title: "长空通信 - 官方网站",
        desc: "更多套餐请看10010.co",
        ogTitle: "长空通信 - 官方网站"
      },
      "skunicom.com": {
        title: "长空通信",
        desc: "更多套餐请看10010.co",
        ogTitle: "邢台市长空科技有限公司"
      }
      "*.skunicom.com": {
        title: "长空通信",
        desc: "更多套餐请看10010.co",
        ogTitle: "邢台市长空科技有限公司"
      }
    };

    // 默认配置（没有匹配到域名时使用）
    const defaultConfig = {
      title: "长空通信",
      desc: "更多套餐请看10010.co",
      ogTitle: "长空通信"
    };

    // 自动匹配配置
    const config = domainConfig[domain] || defaultConfig;

    // 设置标题
    document.title = config.title;

    // 设置 description
    document.querySelector('meta[name="description"]').setAttribute("content", config.desc);

    // 设置 OG 标题（社交分享用）
    document.querySelector('meta[property="og:title"]').setAttribute("content", config.ogTitle);

    // 设置 OG 描述
    document.querySelector('meta[property="og:description"]').setAttribute("content", config.desc);
  </script>

  <!-- 以下 meta 会被上面 JS 自动覆盖内容，必须保留标签 -->
  <meta name="description" content="" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />

      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
</head>

<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>

</html>
