<html lang="en">

  <script>
    // 获取当前访问的域名（不带端口）
    const domain = window.location.hostname;
    console.log("当前访问域名：", domain); // 调试用，可看到真实域名

    // 配置：必须写 真实完整域名，不能写 * 通配符
    const domainConfig = {
      "hk.sb": {
        title: "长空通信防失联页",
        desc: "更多套餐请看10010.co",
        ogTitle: "更多套餐请看10010.co"
      },
      "www.hk.sb": {
        title: "长空通信防失联页",
        desc: "更多套餐请看10010.co",
        ogTitle: "更多套餐请看10010.co"
      },
      "skunicom.com": {
        title: "长空通信",
        desc: "更多套餐请看10010.co",
        ogTitle: "更多套餐请看10010.co"
      },
      "www.skunicom.com": {
        title: "长空通信",
        desc: "更多套餐请看10010.co",
        ogTitle: "更多套餐请看10010.co"
      }
    };

    // 默认配置（匹配不到域名时使用）
    const defaultConfig = {
      title: "长空通信防失联页",
      desc: "更多套餐请看10010.co",
      ogTitle: "更多套餐请看10010.co"
    };

    // 自动匹配
    const config = domainConfig[domain] || defaultConfig;

    // 设置标题
    document.title = config.title;

    // 设置 meta 描述
    document.querySelector('meta[name="description"]').content = config.desc;
    document.querySelector('meta[property="og:title"]').content = config.ogTitle;
    document.querySelector('meta[property="og:description"]').content = config.desc;
  </script>

  <meta name="description" content="" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
